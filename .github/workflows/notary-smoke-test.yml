name: Notary Smoke Test

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke-test:
    name: Notarize minimal signed app
    runs-on: macos-26

    steps:
      - name: Import Code Signing Certificate
        id: certificate
        env:
          CERTIFICATES_P12: ${{ secrets.CERTIFICATES_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "$CERTIFICATES_P12" ]; then
            echo "❌ Error: CERTIFICATES_P12 secret is missing."
            exit 1
          fi
          if [ -z "$CERTIFICATE_PASSWORD" ]; then
            echo "❌ Error: CERTIFICATE_PASSWORD secret is missing."
            exit 1
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/notary-smoke.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATES_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -A

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | sed -n 's/.*"\(Developer ID Application:[^"]*\)".*/\1/p' \
            | head -1)
          if [ -z "$IDENTITY" ]; then
            echo "❌ Error: No Developer ID Application signing identity found."
            exit 1
          fi

          echo "identity=$IDENTITY" >> "$GITHUB_OUTPUT"
          echo "keychain=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"
          echo "✅ Developer ID identity found: $IDENTITY"

      - name: Build and sign minimal app
        run: |
          set -euo pipefail

          APP="$RUNNER_TEMP/NotarySmoke.app"
          mkdir -p "$APP/Contents/MacOS"

          cat > "$RUNNER_TEMP/smoke.c" <<'C'
          #include <stdio.h>
          int main(void) {
            puts("PHTV notarization smoke test");
            return 0;
          }
          C

          clang "$RUNNER_TEMP/smoke.c" -o "$APP/Contents/MacOS/NotarySmoke"

          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>NotarySmoke</string>
            <key>CFBundleIdentifier</key>
            <string>com.phamhungtien.phtv.notary-smoke</string>
            <key>CFBundleName</key>
            <string>NotarySmoke</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
          </dict>
          </plist>
          PLIST

          codesign --force \
            --sign "${{ steps.certificate.outputs.identity }}" \
            --options runtime \
            --timestamp \
            --keychain "${{ steps.certificate.outputs.keychain }}" \
            "$APP"

          codesign --verify --deep --strict --verbose=2 "$APP"
          /usr/bin/ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/NotarySmoke.zip"
          echo "SMOKE_ZIP=$RUNNER_TEMP/NotarySmoke.zip" >> "$GITHUB_ENV"

      - name: Submit smoke test to Apple notarization
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          if [ -z "$APPLE_ID" ]; then
            echo "❌ Error: APPLE_ID secret is missing."
            exit 1
          fi
          if [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "❌ Error: APPLE_APP_SPECIFIC_PASSWORD secret is missing."
            exit 1
          fi
          if [ -z "$APPLE_TEAM_ID" ]; then
            echo "❌ Error: APPLE_TEAM_ID secret is missing."
            exit 1
          fi

          SUBMIT_LOG="$RUNNER_TEMP/notary-smoke-submit.log"

          # Use --wait so notarytool blocks until Apple returns a final status.
          # This avoids the manual poll loop and the "In Progress" stuck failure mode.
          set +e
          xcrun notarytool submit "$SMOKE_ZIP" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait \
            --timeout 1800 \
            2>&1 | tee "$SUBMIT_LOG"
          NOTARY_EXIT=$?
          set -e

          SUBMISSION_ID=$(grep -oE 'id: [0-9a-f-]{36}' "$SUBMIT_LOG" | head -1 | awk '{print $2}' || true)

          if grep -q 'status: Accepted' "$SUBMIT_LOG"; then
            STATUS="Accepted"
          elif grep -q 'status: Invalid' "$SUBMIT_LOG"; then
            STATUS="Invalid"
          elif grep -q 'status: Rejected' "$SUBMIT_LOG"; then
            STATUS="Rejected"
          else
            STATUS="Unknown"
          fi

          echo "📋 Smoke notarization result: status=$STATUS exit=$NOTARY_EXIT"

          if [ "$STATUS" != "Accepted" ]; then
            echo "❌ Smoke notarization status: $STATUS"
            echo "📚 Recent Apple notary history for this team:"
            xcrun notarytool history \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
            if [ -n "$SUBMISSION_ID" ]; then
              echo "📋 Apple notary log for $SUBMISSION_ID:"
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --team-id "$APPLE_TEAM_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
            fi
            exit 1
          fi

          echo "✅ Minimal signed app notarized successfully."
