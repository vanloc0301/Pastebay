# Pastebay CI workflow

name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Clipboard Tests
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        working-directory: App
        run: |
          set -o pipefail
          xcodebuild build \
            -project PHTV.xcodeproj \
            -scheme PHTV \
            -configuration Debug \
            -destination 'platform=macOS' \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            | tee build.log

      - name: Run Clipboard History Tests
        run: |
          set -euo pipefail
          DERIVED_DATA_PATH="${DERIVED_DATA_PATH:-$PWD/.build/derived-data}"
          DESTINATION="${PASTEBAY_TEST_DESTINATION:-platform=macOS}"

          pkill -x Pastebay >/dev/null 2>&1 || true

          run_clipboard_tests() {
            xcodebuild \
              -project App/PHTV.xcodeproj \
              -scheme PHTV \
              -configuration Debug \
              -destination "$DESTINATION" \
              -derivedDataPath "$DERIVED_DATA_PATH" \
              -skipPackagePluginValidation \
              CODE_SIGN_IDENTITY="-" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              DEVELOPMENT_TEAM="" \
              test \
              -only-testing:PastebayTests/ClipboardHistoryLogicTests
          }

          attempt=1
          until run_clipboard_tests; do
            if [ "$attempt" -ge 3 ]; then
              echo "Clipboard History tests failed after $attempt attempts"
              exit 1
            fi
            attempt=$((attempt + 1))
            echo "Retrying Clipboard History tests (attempt $attempt/3)..."
            pkill -x Pastebay >/dev/null 2>&1 || true
            sleep 1
          done

          pkill -x Pastebay >/dev/null 2>&1 || true

      - name: Upload build log
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: ci-build-log
          path: App/build.log
          retention-days: 7
