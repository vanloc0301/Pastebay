# Pastebay release workflow

name: Release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    name: Build Release DMG
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build Release
        working-directory: App
        run: |
          set -euo pipefail
          xcodebuild build \
            -project PHTV.xcodeproj \
            -scheme PHTV \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/pastebay-derived-data" \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            | tee "$RUNNER_TEMP/pastebay-release-build.log"

      - name: Package Pastebay.dmg
        run: |
          set -euo pipefail
          APP_PATH="$RUNNER_TEMP/pastebay-derived-data/Build/Products/Release/Pastebay.app"
          OUT_DIR="$RUNNER_TEMP/pastebay-release"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          DMG_PATH="$OUT_DIR/Pastebay-macOS-$SHORT_SHA.dmg"

          test -d "$APP_PATH"
          mkdir -p "$OUT_DIR"

          hdiutil create \
            -volname "Pastebay" \
            -srcfolder "$APP_PATH" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          shasum -a 256 "$DMG_PATH" > "$DMG_PATH.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pastebay-${{ github.run_number }}
          name: Pastebay ${{ github.run_number }}
          files: |
            ${{ runner.temp }}/pastebay-release/Pastebay-macOS-*.dmg
            ${{ runner.temp }}/pastebay-release/Pastebay-macOS-*.dmg.sha256

      - name: Upload build log
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: release-build-log
          path: ${{ runner.temp }}/pastebay-release-build.log
          retention-days: 7
