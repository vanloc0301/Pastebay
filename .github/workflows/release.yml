# PHTV release workflow
# Author: Phạm Hùng Tiến
# Copyright © 2026 Phạm Hùng Tiến. All rights reserved.

name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

# Prevent concurrent releases from racing on appcast commits.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build PHTV (${{ matrix.arch }})
    runs-on: [self-hosted, phtv-mac]
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - arch: arm64
            asset_suffix: arm64
            excluded_archs: x86_64
            appcast_file: appcast.xml
          - arch: x86_64
            asset_suffix: intel
            excluded_archs: arm64
            appcast_file: appcast-intel.xml

    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.set_versions.outputs.build_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

      - name: Validate dictionary sources
        run: swift scripts/tools/generate_dict_binary.swift --strict-check-sources

      - name: Verify dictionary binaries are current
        run: |
          set -euo pipefail
          swift scripts/tools/generate_dict_binary.swift
          if ! git diff --exit-code -- App/PHTV/Resources/Dictionaries/en_dict.bin App/PHTV/Resources/Dictionaries/vi_dict.bin; then
            echo "❌ Dictionary binaries are stale. Re-run swift scripts/tools/generate_dict_binary.swift and commit the updated .bin files."
            exit 1
          fi

      - name: Compute build number
        id: set_versions
        run: |
          PREVIOUS_BUILD=$(python3 - <<'PY'
          import subprocess
          import xml.etree.ElementTree as ET

          ns = {"sparkle": "http://www.andymatuschak.org/xml-namespaces/sparkle"}
          sparkle_attr_version = "{http://www.andymatuschak.org/xml-namespaces/sparkle}version"
          candidates = [
              "docs/appcast.xml",
              "docs/appcast-intel.xml",
          ]

          def load_text(path):
              specs = [f"origin/main:{path}", path]
              for spec in specs:
                  try:
                      if ":" in spec:
                          return subprocess.check_output(
                              ["git", "show", spec],
                              text=True,
                              stderr=subprocess.DEVNULL,
                          )
                      with open(spec, "r", encoding="utf-8") as handle:
                          return handle.read()
                  except Exception:
                      continue
              return None

          max_build = 0
          for path in candidates:
              content = load_text(path)
              if not content:
                  continue

              root = ET.fromstring(content)
              channel = root.find("channel")
              if channel is None:
                  continue

              for item in channel.findall("item"):
                  version_node = item.find("sparkle:version", ns)
                  if version_node is not None and version_node.text:
                      try:
                          max_build = max(max_build, int(version_node.text.strip()))
                      except ValueError:
                          pass

                  enclosure = item.find("enclosure")
                  if enclosure is not None:
                      raw = enclosure.get(sparkle_attr_version)
                      if raw:
                          try:
                              max_build = max(max_build, int(raw.strip()))
                          except ValueError:
                              pass

          print(max_build)
          PY
          )

          BUILD_NUMBER=$((PREVIOUS_BUILD + 1))
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "✅ Previous build: $PREVIOUS_BUILD"
          echo "✅ BUILD_NUMBER=$BUILD_NUMBER"

      - name: Import Code Signing Certificate
        id: certificate
        env:
          CERTIFICATES_P12: ${{ secrets.CERTIFICATES_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "$CERTIFICATES_P12" ]; then
            echo "❌ Error: CERTIFICATES_P12 secret is missing."
            exit 1
          fi
          if [ -z "$CERTIFICATE_PASSWORD" ]; then
            echo "❌ Error: CERTIFICATE_PASSWORD secret is missing."
            exit 1
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/signing-${{ matrix.arch }}.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          curl -sL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer -o "$RUNNER_TEMP/AppleWWDRCAG3.cer"
          security import "$RUNNER_TEMP/AppleWWDRCAG3.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security

          echo "$CERTIFICATES_P12" > "$RUNNER_TEMP/cert_base64.txt"
          python3 -c "import base64; open('$RUNNER_TEMP/certificate.p12', 'wb').write(base64.b64decode(open('$RUNNER_TEMP/cert_base64.txt', 'r').read()))"

          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -A

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "🔎 Available code signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | sed -n 's/.*"\(Developer ID Application:[^"]*\)".*/\1/p' \
            | head -1)
          if [ -z "$IDENTITY" ]; then
            echo "❌ Error: No Developer ID Application signing identity found."
            echo "CERTIFICATES_P12 must be exported from a Developer ID Application certificate."
            echo "Apple Development certificates cannot be used for notarized public macOS releases."
            exit 1
          fi

          echo "🔐 Developer ID identity found: $IDENTITY"
          echo "identity=$IDENTITY" >> "$GITHUB_OUTPUT"
          echo "keychain=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"

      - name: Verify dependencies
        working-directory: App
        run: |
          echo "🔍 Verifying SPM dependencies..."
          # Resolve packages to check versions
          xcodebuild -project PHTV.xcodeproj -scheme PHTV \
            -showBuildSettings -configuration Release 2>/dev/null | grep -i sparkle || echo "Will resolve during build"
          echo "✅ Dependencies verified"

      - name: Build (${{ matrix.arch }})
        working-directory: App
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          if [ -z "$APPLE_TEAM_ID" ]; then
            echo "❌ Error: APPLE_TEAM_ID secret is missing."
            exit 1
          fi

          echo "🏗️  Building ${{ matrix.arch }} binary..."
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_NUMBER="${{ steps.set_versions.outputs.build_number }}"
          
          # Build configuration notes:
          # - Sparkle is pinned to version 2.8.1 in project.pbxproj (exactVersion)
          #   This prevents automatic updates that could introduce fat binaries
          #   If updating Sparkle, update project.pbxproj requirement and test thinning

          xcodebuild -project PHTV.xcodeproj -scheme PHTV \
            -configuration Release \
            -derivedDataPath ./build-${{ matrix.arch }} \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            ARCHS="${{ matrix.arch }}" \
            EXCLUDED_ARCHS="${{ matrix.excluded_archs }}" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ steps.certificate.outputs.identity }}" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${{ steps.certificate.outputs.keychain }}" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            clean build \
            2>&1 | tee build-${{ matrix.arch }}.log

          APP_PATH="./build-${{ matrix.arch }}/Build/Products/Release/PHTV.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ Build failed: PHTV.app not found"
            exit 1
          fi

          # Thin any fat binaries left behind by embedded XCFrameworks
          # (e.g. Sparkle ships a macos-arm64_x86_64 slice that xcodebuild build
          # does not automatically thin — only archive+export does this for free).
          echo "🪓 Stripping ${{ matrix.excluded_archs }} from fat binaries..."
          FOUND_FAT=0
          while IFS= read -r -d '' binary; do
            info=$(lipo -info "$binary" 2>/dev/null) || continue
            if echo "$info" | grep -qE "^Architectures in the fat file:"; then
              FOUND_FAT=1
              echo "  Thinning: ${binary#$APP_PATH/}"
              # Create temporary file to avoid overwriting while lipo is reading
              TEMP_FILE="${binary}.thin"
              if lipo -thin "${{ matrix.arch }}" -output "$TEMP_FILE" "$binary" 2>&1; then
                mv "$TEMP_FILE" "$binary"
              else
                echo "    ⚠️  Warning: lipo failed for ${binary#$APP_PATH/}, keeping original"
                rm -f "$TEMP_FILE"
              fi
            fi
          done < <(find "$APP_PATH" -type f -print0)

          echo "🔏 Re-signing app bundle and nested code..."

          sign_code() {
            local target="$1"
            echo "  Signing: ${target#$APP_PATH/}"
            codesign --force --sign "${{ steps.certificate.outputs.identity }}" \
              --options runtime \
              --timestamp \
              --keychain "${{ steps.certificate.outputs.keychain }}" \
              "$target"
          }

          sign_macho_file() {
            local target="$1"
            if lipo -info "$target" >/dev/null 2>&1; then
              sign_code "$target"
            fi
          }

          # Sign nested code from the inside out. Sparkle embeds XPC services,
          # helper apps, frameworks, and standalone executables such as
          # Sparkle.framework/Versions/B/Autoupdate.
          while IFS= read -r -d '' nested; do sign_code "$nested"; done < <(find "$APP_PATH" -type d -name "*.xpc" -print0)
          while IFS= read -r -d '' nested; do sign_code "$nested"; done < <(find "$APP_PATH" -type d -name "*.app" ! -path "$APP_PATH" -print0)
          while IFS= read -r -d '' nested; do sign_macho_file "$nested"; done < <(find "$APP_PATH/Contents/Frameworks" -type f -print0)
          while IFS= read -r -d '' nested; do sign_code "$nested"; done < <(find "$APP_PATH" -type d -name "*.framework" -print0)
          while IFS= read -r -d '' nested; do sign_code "$nested"; done < <(find "$APP_PATH" -type d -name "*.appex" -print0)

          codesign --force --sign "${{ steps.certificate.outputs.identity }}" \
            --options runtime \
            --timestamp \
            --entitlements PHTV/PHTV.entitlements \
            --keychain "${{ steps.certificate.outputs.keychain }}" \
            "$APP_PATH"
          echo "✅ Re-signed app bundle and nested code"

          # Verify only the expected arch is present in the main executable.
          echo "📐 Verifying architectures in main binary..."
          if file "$APP_PATH/Contents/MacOS/PHTV" 2>&1 | grep -q "Mach-O 64-bit executable ${{ matrix.arch }}"; then
            echo "✅ Binary is correct architecture: ${{ matrix.arch }}"
          else
            echo "⚠️  Could not verify architecture with file command, checking with lipo..."
            ACTUAL_ARCHS=$(lipo -archs "$APP_PATH/Contents/MacOS/PHTV" 2>&1 || echo "error")
            echo "📐 Architectures in main binary: $ACTUAL_ARCHS"
            if [[ "$ACTUAL_ARCHS" != "${{ matrix.arch }}" ]]; then
              echo "❌ Architecture mismatch: expected ${{ matrix.arch }}, got $ACTUAL_ARCHS"
              exit 1
            fi
          fi

          # Verify no fat binaries remain anywhere in the bundle.
          echo "🔍 Checking for residual fat binaries..."
          FAT_REMAINING=0
          while IFS= read -r -d '' binary; do
            info=$(lipo -info "$binary" 2>/dev/null) || continue
            if echo "$info" | grep -qE "^Architectures in the fat file:"; then
              echo "  ⚠️  Still fat: ${binary#$APP_PATH/}"
              FAT_REMAINING=1
            fi
          done < <(find "$APP_PATH" -type f -print0)
          if [ "$FAT_REMAINING" -eq 1 ]; then
            echo "⚠️  Warning: Some fat binaries remain (usually acceptable for embedded frameworks)"
            echo "    These will be handled by the signing process or notarization"
          fi

          echo "🔍 Verifying code signature..."
          codesign -dv --verbose=2 "$APP_PATH" 2>&1
          codesign --verify --deep --strict "$APP_PATH" 2>&1
          while IFS= read -r -d '' autoupdate; do
            echo "🔍 Verifying Sparkle Autoupdate signature: ${autoupdate#$APP_PATH/}"
            codesign -dv --verbose=4 "$autoupdate" 2>&1
            codesign --verify --strict --verbose=2 "$autoupdate"
          done < <(find "$APP_PATH" -type f -name Autoupdate -print0)
          ENTITLEMENTS_PLIST="$RUNNER_TEMP/PHTV-${{ matrix.arch }}.entitlements.plist"
          codesign -d --entitlements :- "$APP_PATH" 2>/dev/null > "$ENTITLEMENTS_PLIST"
          plutil -p "$ENTITLEMENTS_PLIST"

      - name: Verify app bundle metadata
        working-directory: App
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_NUMBER="${{ steps.set_versions.outputs.build_number }}"
          APP_INFO="./build-${{ matrix.arch }}/Build/Products/Release/PHTV.app/Contents/Info.plist"

          APP_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_INFO")
          APP_BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_INFO")

          echo "App CFBundleShortVersionString=$APP_VERSION"
          echo "App CFBundleVersion=$APP_BUILD"

          if [ "$APP_VERSION" != "$VERSION" ]; then
            echo "❌ Version mismatch (expected $VERSION, got $APP_VERSION)"
            exit 1
          fi
          if [ "$APP_BUILD" != "$BUILD_NUMBER" ]; then
            echo "❌ Build number mismatch (expected $BUILD_NUMBER, got $APP_BUILD)"
            exit 1
          fi

          /usr/libexec/PlistBuddy -c "Print :SUFeedURL" "$APP_INFO"
          /usr/libexec/PlistBuddy -c "Print :SUPublicEDKey" "$APP_INFO"
          echo "✅ App metadata correct"

      - name: Create DMG (${{ matrix.arch }})
        id: dmg
        working-directory: App
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_PATH="./build-${{ matrix.arch }}/Build/Products/Release/PHTV.app"
          DMG_NAME="PHTV-$VERSION-${{ matrix.asset_suffix }}.dmg"
          export LANG="en_US.UTF-8"
          export LC_ALL="en_US.UTF-8"

          xattr -cr "$APP_PATH"
          TEMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TEMP_DIR"' EXIT

          if ! command -v create-dmg >/dev/null 2>&1; then
            brew install create-dmg
          fi

          cp -R "$APP_PATH" "$TEMP_DIR/"

          # Build a visual DMG background (Vietnamese instructions + drag arrow)
          # so users immediately understand the install flow.
          BACKGROUND_IMG="$TEMP_DIR/dmg-background.png"
          swift - "$BACKGROUND_IMG" <<'SWIFT'
          import AppKit
          import Foundation

          guard CommandLine.arguments.count > 1 else {
            fputs("Missing output file path\n", stderr)
            exit(1)
          }

          let outputPath = CommandLine.arguments[1]
          let width: CGFloat = 660
          let height: CGFloat = 400
          let canvasRect = NSRect(x: 0, y: 0, width: width, height: height)

          guard let bitmap = NSBitmapImageRep(
            bitmapDataPlanes: nil,
            pixelsWide: Int(width),
            pixelsHigh: Int(height),
            bitsPerSample: 8,
            samplesPerPixel: 4,
            hasAlpha: true,
            isPlanar: false,
            colorSpaceName: .deviceRGB,
            bytesPerRow: 0,
            bitsPerPixel: 0
          ) else {
            fputs("Unable to allocate bitmap for DMG background\n", stderr)
            exit(1)
          }

          guard let context = NSGraphicsContext(bitmapImageRep: bitmap) else {
            fputs("Unable to create graphics context for DMG background\n", stderr)
            exit(1)
          }

          NSGraphicsContext.saveGraphicsState()
          NSGraphicsContext.current = context

          let background = NSGradient(colors: [
            NSColor(calibratedRed: 0.95, green: 0.98, blue: 1.00, alpha: 1.0),
            NSColor(calibratedRed: 0.88, green: 0.94, blue: 1.00, alpha: 1.0)
          ])!
          background.draw(in: canvasRect, angle: 90)

          let titleAttributes: [NSAttributedString.Key: Any] = [
            .font: NSFont.systemFont(ofSize: 28, weight: .semibold),
            .foregroundColor: NSColor(calibratedRed: 0.10, green: 0.21, blue: 0.37, alpha: 1.0)
          ]

          let text = "Kéo thả vào Applications để cài đặt"
          let textSize = text.size(withAttributes: titleAttributes)
          text.draw(at: NSPoint(x: (width - textSize.width) / 2, y: 310), withAttributes: titleAttributes)

          if let arrowImage = NSImage(systemSymbolName: "arrow.right", accessibilityDescription: nil) {
              let arrowColor = NSColor(calibratedRed: 0.65, green: 0.68, blue: 0.72, alpha: 0.8)
              let config = NSImage.SymbolConfiguration(pointSize: 70, weight: .regular)
                  .applying(.init(hierarchicalColor: arrowColor))
              if let configuredArrow = arrowImage.withSymbolConfiguration(config) {
                  let arrowSize = configuredArrow.size
                  let arrowRect = NSRect(
                      x: 330 - arrowSize.width / 2,
                      y: 180 - arrowSize.height / 2,
                      width: arrowSize.width,
                      height: arrowSize.height
                  )
                  configuredArrow.draw(in: arrowRect)
              }
          }

          NSGraphicsContext.restoreGraphicsState()

          guard let pngData = bitmap.representation(using: .png, properties: [:]) else {
            fputs("Unable to generate DMG background image\n", stderr)
            exit(1)
          }

          do {
            try pngData.write(to: URL(fileURLWithPath: outputPath), options: .atomic)
          } catch {
            fputs("Failed to write DMG background image: \(error)\n", stderr)
            exit(1)
          }
          SWIFT

          # create-dmg (Homebrew 1.2.x) does not support --overwrite.
          # Remove any stale file first for compatibility across runners.
          rm -f "$DMG_NAME"

          create-dmg \
            --hdiutil-quiet \
            --volname "PHTV" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --background "$BACKGROUND_IMG" \
            --icon-size 110 \
            --text-size 14 \
            --icon "PHTV.app" 160 180 \
            --app-drop-link 500 180 \
            "$DMG_NAME" \
            "$TEMP_DIR"

          echo "🔐 Signing DMG..."
          codesign --force --sign "${{ steps.certificate.outputs.identity }}" \
            --timestamp \
            --keychain "${{ steps.certificate.outputs.keychain }}" \
            "$DMG_NAME"
          codesign --verify --verbose=2 "$DMG_NAME"

          SIZE=$(stat -f%z "$DMG_NAME")
          echo "name=$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "✅ DMG created: $DMG_NAME ($SIZE bytes)"

      - name: Notarize and staple DMG (${{ matrix.arch }})
        working-directory: App
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          if [ -z "$APPLE_ID" ]; then
            echo "❌ Error: APPLE_ID secret is missing."
            exit 1
          fi
          if [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "❌ Error: APPLE_APP_SPECIFIC_PASSWORD secret is missing."
            exit 1
          fi
          if [ -z "$APPLE_TEAM_ID" ]; then
            echo "❌ Error: APPLE_TEAM_ID secret is missing."
            exit 1
          fi

          DMG_NAME="${{ steps.dmg.outputs.name }}"
          if [ ! -f "$DMG_NAME" ]; then
            echo "❌ Error: $DMG_NAME not found."
            exit 1
          fi

          echo "📚 Recent Apple notary history before submitting:"
          xcrun notarytool history \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" || true

          echo "📤 Submitting $DMG_NAME to Apple notarization (waiting for result)..."
          SUBMIT_LOG="$RUNNER_TEMP/notary-submit-${{ matrix.arch }}.log"

          # Use --wait so notarytool blocks until Apple returns a final status
          # (Accepted / Invalid / Rejected). This avoids manual polling loops
          # and the "In Progress" stuck-forever failure mode that occurs when
          # the poll window expires before Apple finishes processing.
          # Timeout is set generously (5h) for first-time notarization and
          # backed-up Apple queues, while still staying under the 360m job cap.
          set +e
          xcrun notarytool submit "$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait \
            --timeout 5h \
            2>&1 | tee "$SUBMIT_LOG"
          NOTARY_EXIT=$?
          set -e

          # Extract submission ID from the log output for diagnostics
          SUBMISSION_ID=$(grep -oE 'id: [0-9a-f-]{36}' "$SUBMIT_LOG" | head -1 | awk '{print $2}' || true)

          # Determine final status from log output
          if grep -q 'status: Accepted' "$SUBMIT_LOG"; then
            STATUS="Accepted"
          elif grep -q 'status: Invalid' "$SUBMIT_LOG"; then
            STATUS="Invalid"
          elif grep -q 'status: Rejected' "$SUBMIT_LOG"; then
            STATUS="Rejected"
          else
            STATUS="Unknown"
          fi

          echo "📋 Notarization result: status=$STATUS exit=$NOTARY_EXIT"

          if [ "$STATUS" != "Accepted" ]; then
            echo "❌ Notarization failed with status: $STATUS"
            echo "📚 Recent Apple notary history for this team:"
            xcrun notarytool history \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
            if [ -n "$SUBMISSION_ID" ]; then
              echo "📋 Apple notary log for $SUBMISSION_ID:"
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --team-id "$APPLE_TEAM_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
            fi
            exit 1
          fi

          echo "📎 Stapling notarization ticket..."
          xcrun stapler staple "$DMG_NAME"
          xcrun stapler validate "$DMG_NAME"
          spctl -a -t open --context context:primary-signature -v "$DMG_NAME"
          echo "✅ DMG notarized and stapled: $DMG_NAME"

      - name: Generate Sparkle appcast (${{ matrix.arch }})
        working-directory: App
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "❌ Error: SPARKLE_PRIVATE_KEY secret is missing."
            exit 1
          fi

          VERSION="${{ steps.version.outputs.version }}"
          DMG_NAME="${{ steps.dmg.outputs.name }}"
          APPCAST_FILE="${{ matrix.appcast_file }}"
          ARCHIVES_DIR="$RUNNER_TEMP/sparkle_archives_${{ matrix.arch }}"
          APPCAST_WORK_FILE="$ARCHIVES_DIR/appcast.xml"
          APPCAST_OUTPUT_FILE="$ARCHIVES_DIR/$APPCAST_FILE"
          mkdir -p "$ARCHIVES_DIR"
          cp "$DMG_NAME" "$ARCHIVES_DIR/"

          # Sparkle generate_appcast always reads/writes appcast.xml in the archive directory.
          # Seed that working filename from the architecture-specific feed, then rename afterward.
          if git show origin/main:docs/$APPCAST_FILE > "$APPCAST_WORK_FILE" 2>/dev/null; then
            echo "✅ Using latest docs/$APPCAST_FILE from origin/main"
          elif [ -f "../docs/$APPCAST_FILE" ]; then
            cp "../docs/$APPCAST_FILE" "$APPCAST_WORK_FILE"
            echo "⚠️  Falling back to docs/$APPCAST_FILE from current checkout"
          else
            echo "ℹ️  $APPCAST_FILE not found — generate_appcast will create it fresh"
          fi

          GENERATE_APPCAST="./build-${{ matrix.arch }}/SourcePackages/artifacts/sparkle/Sparkle/bin/generate_appcast"
          if [ ! -x "$GENERATE_APPCAST" ]; then
            echo "❌ Error: generate_appcast not found"
            exit 1
          fi

          DOWNLOAD_PREFIX="https://github.com/${{ github.repository }}/releases/download/v$VERSION/"
          echo "$SPARKLE_PRIVATE_KEY" | "$GENERATE_APPCAST" \
            --ed-key-file - \
            --download-url-prefix "$DOWNLOAD_PREFIX" \
            --maximum-versions 0 \
            "$ARCHIVES_DIR"

          if [ ! -f "$APPCAST_WORK_FILE" ]; then
            echo "❌ Error: generate_appcast did not produce appcast.xml"
            exit 1
          fi

          if [ "$APPCAST_OUTPUT_FILE" != "$APPCAST_WORK_FILE" ]; then
            cp "$APPCAST_WORK_FILE" "$APPCAST_OUTPUT_FILE"
          fi

          cp "$APPCAST_OUTPUT_FILE" "../docs/$APPCAST_FILE"

          python3 - <<PY
          import sys
          import xml.etree.ElementTree as ET

          version = "$VERSION".strip()
          build_number = "${{ steps.set_versions.outputs.build_number }}".strip()
          expected_archive = "$DMG_NAME".strip()
          expected_build = int(build_number)
          ns = {"sparkle": "http://www.andymatuschak.org/xml-namespaces/sparkle"}
          sparkle_attr_version = "{http://www.andymatuschak.org/xml-namespaces/sparkle}version"

          tree = ET.parse("../docs/$APPCAST_FILE")
          root = tree.getroot()
          channel = root.find("channel")
          if channel is None:
              print("❌ Error: $APPCAST_FILE missing <channel>")
              sys.exit(1)

          items = channel.findall("item")
          if not items:
              print("❌ Error: $APPCAST_FILE has no <item>")
              sys.exit(1)

          for item in items:
              short_node = item.find("sparkle:shortVersionString", ns)
              short_version = (short_node.text or "").strip() if short_node is not None else ""
              version_node = item.find("sparkle:version", ns)
              enc = item.find("enclosure")
              item_build = None
              if version_node is not None and version_node.text:
                  try: item_build = int(version_node.text.strip())
                  except ValueError: pass
              if item_build is None:
                  if enc is not None:
                      raw = enc.get(sparkle_attr_version)
                      if raw:
                          try: item_build = int(raw.strip())
                          except ValueError: pass
              if short_version == version and item_build == expected_build:
                  enclosure_url = (enc.get("url") or "").strip() if enc is not None else ""
                  if not enclosure_url.endswith(f"/{expected_archive}"):
                      print(f"❌ $APPCAST_FILE points to unexpected archive: {enclosure_url}")
                      sys.exit(1)
                  print(f"✅ $APPCAST_FILE contains shortVersion={version} build={expected_build} archive={expected_archive}")
                  sys.exit(0)

          print(f"❌ $APPCAST_FILE missing item shortVersion={version} build={expected_build}")
          sys.exit(1)
          PY

          if ! grep -q "sparkle:edSignature" ../docs/$APPCAST_FILE; then
            echo "❌ Error: docs/$APPCAST_FILE has no sparkle:edSignature"
            exit 1
          fi
          echo "✅ docs/$APPCAST_FILE generated and signed"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v6
        with:
          name: dmg-${{ matrix.arch }}
          path: App/${{ steps.dmg.outputs.name }}
          retention-days: 1

      - name: Upload appcast artifact
        uses: actions/upload-artifact@v6
        with:
          name: appcast-${{ matrix.arch }}
          path: docs/${{ matrix.appcast_file }}
          retention-days: 7

      - name: Upload build log
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: build-log-${{ matrix.arch }}
          path: App/build-${{ matrix.arch }}.log
          retention-days: 7

      - name: Cleanup signing keychain
        if: always()
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="${{ steps.certificate.outputs.keychain }}"
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          security list-keychains -d user -s "$HOME/Library/Keychains/login.keychain-db" || true
          security default-keychain -s "$HOME/Library/Keychains/login.keychain-db" || true
          rm -f "$RUNNER_TEMP/certificate.p12" "$RUNNER_TEMP/cert_base64.txt" "$RUNNER_TEMP/AppleWWDRCAG3.cer"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download DMG (arm64)
        uses: actions/download-artifact@v8
        with:
          name: dmg-arm64

      - name: Download DMG (intel)
        uses: actions/download-artifact@v8
        with:
          name: dmg-x86_64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: PHTV ${{ needs.build.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
          files: |
            PHTV-${{ needs.build.outputs.version }}-arm64.dmg
            PHTV-${{ needs.build.outputs.version }}-intel.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_appcast:
    name: Publish Appcasts
    runs-on: ubuntu-latest
    needs:
      - build
      - release

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Download appcast (arm64)
        uses: actions/download-artifact@v8
        with:
          name: appcast-arm64
          path: /tmp/phtv-appcast-arm64

      - name: Download appcast (intel)
        uses: actions/download-artifact@v8
        with:
          name: appcast-x86_64
          path: /tmp/phtv-appcast-intel

      - name: Commit and push appcasts
        run: |
          cp /tmp/phtv-appcast-arm64/appcast.xml       docs/appcast.xml
          cp /tmp/phtv-appcast-intel/appcast-intel.xml docs/appcast-intel.xml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/appcast.xml docs/appcast-intel.xml

          if git diff --staged --quiet; then
            echo "No appcast changes to commit."
            exit 0
          fi

          git commit -m "chore: update appcasts for v${{ needs.build.outputs.version }} [skip ci]"
          git push origin main

  update-homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs:
      - build
      - release
      - publish_appcast

    steps:
      - name: Download DMG artifacts
        uses: actions/download-artifact@v8
        with:
          name: dmg-arm64

      - uses: actions/download-artifact@v8
        with:
          name: dmg-x86_64

      - name: Update tap formula
        env:
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail

          if [ -z "$TAP_REPO_TOKEN" ]; then
            echo "❌ Error: TAP_REPO_TOKEN secret is missing."
            exit 1
          fi

          SHA256_ARM64=$(sha256sum "PHTV-$VERSION-arm64.dmg" | cut -d' ' -f1)
          SHA256_INTEL=$(sha256sum "PHTV-$VERSION-intel.dmg" | cut -d' ' -f1)
          echo "✅ arm64 SHA256: $SHA256_ARM64"
          echo "✅ intel SHA256: $SHA256_INTEL"

          git clone "https://x-access-token:${TAP_REPO_TOKEN}@github.com/PhamHungTien/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          # Update cask with arch-specific URLs and checksums
          VERSION="$VERSION" SHA256_ARM64="$SHA256_ARM64" SHA256_INTEL="$SHA256_INTEL" python3 - <<'PY'
          import os, re, sys
          from pathlib import Path

          cask_path = Path("Casks/phtv.rb")
          if not cask_path.exists():
              print("❌ Error: Casks/phtv.rb not found", file=sys.stderr)
              sys.exit(1)

          v       = os.environ["VERSION"]
          sha_arm = os.environ["SHA256_ARM64"]
          sha_x86 = os.environ["SHA256_INTEL"]

          text = cask_path.read_text(encoding="utf-8")

          # Update version line
          text, n = re.subn(r'(?m)^(\s*)version\s+"[^"]+"\s*$', rf'\1version "{v}"', text, count=1)
          if n != 1:
              print("❌ Could not find version line in Casks/phtv.rb", file=sys.stderr)
              sys.exit(1)

          # Check if cask already has arch do stanza; if so, update both shas
          if "on_arm" in text or "arch do" in text:
              text = re.sub(r'(on_arm\s+do.*?sha256\s+")[^"]+(")', rf'\g<1>{sha_arm}\g<2>', text, flags=re.DOTALL)
              text = re.sub(r'(on_intel\s+do.*?sha256\s+")[^"]+(")', rf'\g<1>{sha_x86}\g<2>', text, flags=re.DOTALL)
          else:
              # Legacy single sha256 — replace with arch-specific block
              # Replace the single sha256 line with an arch do block
              text, n = re.subn(
                  r'(?m)^(\s*)url\s+"[^"]+"\s*\n(\s*)sha256\s+"[^"]+"\s*$',
                  rf'\1on_arm do\n\1  url "https://github.com/PhamHungTien/PHTV/releases/download/v{v}/PHTV-{v}-arm64.dmg"\n\1  sha256 "{sha_arm}"\n\1end\n\1on_intel do\n\1  url "https://github.com/PhamHungTien/PHTV/releases/download/v{v}/PHTV-{v}-intel.dmg"\n\1  sha256 "{sha_x86}"\n\1end',
                  text, count=1
              )
              if n != 1:
                  print("❌ Could not update url/sha256 in Casks/phtv.rb", file=sys.stderr)
                  sys.exit(1)

          cask_path.write_text(text, encoding="utf-8")
          print("✅ Updated Casks/phtv.rb")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/phtv.rb
          if git diff --staged --quiet; then
            echo "No changes to tap"
            exit 0
          fi
          git commit -m "chore: update phtv to v$VERSION (arm64 + intel)"
          git push origin main
          echo "✅ Tap synced"
